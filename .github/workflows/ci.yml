name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.os }})

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang llvm llvm-dev \
            libelf-dev zlib1g-dev \
            linux-tools-common \
            linux-headers-$(uname -r) \
            cppcheck \
            pkg-config

      - name: Install bpftool
        run: |
          # Build from submodule to bypass the broken/virtual system package
          cd bpftool/src
          make -j$(nproc)
          sudo make install
          cd ../..

      - name: Build libbpf
        run: |
          cd libbpf/src
          make BUILD_STATIC_ONLY=1
          sudo make install
          cd ../..

      - name: Build
        run: make V=1 BPFTOOL=/usr/local/sbin/bpftool

      - name: Unit Tests
        run: make test BPFTOOL=/usr/local/sbin/bpftool

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: arp-monitor-${{ matrix.os }}
          path: arp-monitor

  static-analysis:
    runs-on: ubuntu-22.04
    name: Static Analysis
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck clang-format

      - name: cppcheck
        run: |
          cppcheck --enable=all --suppress=missingIncludeSystem \
            --suppress=unusedFunction \
            --suppress=invalidPrintfArgType_uint \
            --suppress=constParameter \
            --suppress=unmatchedSuppression \
            -DLIBBPF_OPTS \
            --error-exitcode=1 \
            -Iinclude -Isrc src/*.c

      - name: clang-format check
        run: |
          find src include tests -name '*.[ch]' | \
            xargs clang-format --dry-run -Werror

  sanitizers:
    runs-on: ubuntu-22.04
    name: ASan + UBSan
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang llvm libelf-dev zlib1g-dev \
            linux-headers-$(uname -r)

      - name: Build libbpf
        run: |
          cd libbpf/src
          make BUILD_STATIC_ONLY=1
          sudo make install
          cd ../..

      - name: Install bpftool
        run: |
          cd bpftool/src
          make -j$(nproc)
          sudo make install
          cd ../..

      - name: Build with sanitizers
        run: make SANITIZE=1 V=1 BPFTOOL=/usr/local/sbin/bpftool

      - name: Run unit tests under ASan
        run: make test BPFTOOL=/usr/local/sbin/bpftool